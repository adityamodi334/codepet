<!DOCTYPE html>
<html>
<head>
  <title>CodePet Admin</title>
  <style>
    body{
      background:#0d0d14;
      color:#e8e8f0;
      font-family: 'Inter', sans-serif;
      padding:20px;
    }

    h1{
      text-align:center;
      margin-bottom:20px;
    }

    .btn{
      padding:10px 16px;
      background:#7F77DD;
      border:none;
      border-radius:10px;
      color:white;
      cursor:pointer;
      font-weight:600;
      transition:0.2s;
    }

    .btn:hover{
      transform:translateY(-2px);
      background:#5c55c9;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fill,minmax(250px,1fr));
      gap:15px;
      margin-top:20px;
    }

    .card{
      background:#1a1a2e;
      padding:15px;
      border-radius:16px;
      border:1px solid #2a2a3d;
      transition:0.2s;
    }

    .card:hover{
      transform:scale(1.03);
    }

    .username{
      font-size:18px;
      font-weight:700;
      margin-bottom:5px;
    }

    .stats{
      font-size:13px;
      color:#aaa;
      margin-bottom:10px;
    }

    .delete-btn{
      background:#e24b4a;
      padding:6px 10px;
      border:none;
      border-radius:8px;
      color:white;
      cursor:pointer;
      font-size:12px;
    }

    .delete-btn:hover{
      background:#c0392b;
    }
  </style>
</head>

<body>

<h1>🛠 CodePet Admin Panel</h1>

<div style="text-align:center;">
  <button class="btn" onclick="loadPlayers()">Load Players</button>
</div>

<div class="grid" id="list"></div>

<script>
const API = "";

async function loadPlayers(){
  const res = await fetch(API + "/admin/players");
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="username">${p.username}</div>
      <div class="stats">Pet: ${p.pet_name}</div>
      <div class="stats">XP: ${p.xp}</div>
      <div class="stats">🔥 Streak: ${p.streak}</div>
      <div class="stats">⏱ ${p.total_mins} mins</div>
      <button class="delete-btn" onclick="deletePlayer(${p.id})">Delete</button>
    `;

    list.appendChild(div);
  });
}

async function deletePlayer(id){
  await fetch(API + "/admin/player/" + id, { method: "DELETE" });
  loadPlayers();
}
</script>

</body>
</html>
